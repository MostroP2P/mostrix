# Settings for Mostrix

# Mostro pubkey, it can be hex or npub
mostro_pubkey = "mostro_pubkey_hex_format"
# Admin private key - leave empty for user mode
admin_privkey = ""
# Relays to connect to
relays = ["wss://relay.mostro.network"]
log_level = "info"
# Visually filter currencies to show in the UI
currencies_filter = ["VES", "ARS", "USD"]
# Nostr private key in nsec format
nsec_privkey = 'nsec1_privkey_format'
# User mode: "user" or "admin"
user_mode = "user"
# Lightning address when you buy (receive via LNURL-pay); leave empty if unused.
ln_address = ""
# Blossom media servers for encrypted chat attachments (tried in order on upload).
# blossom_servers = ["https://blossom.primal.net", "https://blossom.band"]
